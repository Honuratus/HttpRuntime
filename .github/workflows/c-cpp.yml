name: C/C++ CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            build-essential \
            libcurl4-openssl-dev \
            libsqlite3-dev \
            python3

      - name: Fetch Unity
        run: |
          mkdir -p external
          git clone --depth 1 https://github.com/ThrowTheSwitch/Unity.git external/unity

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug

      - name: Build
        run: cmake --build build

      - name: Start local test server
        run: |
          mkdir -p /tmp/fuckman-test-server
          echo "fuckman test server" > /tmp/fuckman-test-server/index.html
          cd /tmp/fuckman-test-server
          python3 -m http.server 8080 --bind 127.0.0.1 &
          sleep 1

      - name: Test
        run: ctest --test-dir build --output-on-failure